<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Educational Reforms | सोनम वांगचुक अभियान</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
color:#222;
}

header{

background:linear-gradient(
180deg,
#FF9933,
#ffffff,
#138808);

padding:30px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,.2);

}

header h1{

color:#000080;
font-size:34px;
margin-bottom:12px;

}

header h2{

font-size:21px;
font-weight:normal;

}

.language{

text-align:center;
padding:20px;
background:white;

}

.language button{

padding:10px 25px;
margin:10px;
font-size:17px;
border:none;
border-radius:6px;
cursor:pointer;
background:#0b63ce;
color:white;

}

.language button:hover{

background:#084b9d;

}

.container{

max-width:900px;
margin:auto;
padding:25px;

}

.card{

background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,.15);

}

h3{

color:#003366;
margin-bottom:20px;

}

p{

font-size:18px;
line-height:1.8;

}

.mailButton{

display:inline-block;
margin-top:30px;
padding:16px 26px;
background:#0b63ce;
color:white;
text-decoration:none;
border-radius:8px;
font-size:20px;
font-weight:bold;

}

.mailButton:hover{

background:#084b9d;

}

footer{

margin-top:50px;
padding:20px;
text-align:center;
background:#eee;

}

</style>

<script>

function showLanguage(lang){

document.getElementById("hindi").style.display="none";
document.getElementById("english").style.display="none";

document.getElementById(lang).style.display="block";

}

</script>

</head>

<body>

<header>

<h1>🇮🇳 भारत सरकार से विनम्र अनुरोध 🇮🇳</h1>

<h2>

सोनम वांगचुक जी का अनशन समाप्त कराइए।<br>

शैक्षिक सुधार कर भारत का भविष्य बनाइए।

</h2>

</header>

<div class="language">

<h3>Select Language / भाषा चुनें</h3>

<button onclick="showLanguage('hindi')">

🇮🇳 हिन्दी

</button>

<button onclick="showLanguage('english')">

🇬🇧 English

</button>

</div>

<div class="container">

<div id="hindi" class="card">

<h3>

विषय : सोनम वांगचुक जी का अनशन समाप्त कर शैक्षिक सुधार करने हेतु विनम्र अनुरोध

</h3>
